services:
  - type: web
    name: radconsent
    runtime: docker
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: ALLOWED_ORIGIN
        value: https://radconsent-v2.onrender.com
      - key: JWT_SECRET
        generateValue: true
    autoDeploy: true
