# fly.toml — Fly.io deployment config for RadConsent demo
# After running `fly apps create`, replace "radconsent-demo" below with your chosen app name.
app = "radconsent-demo"
primary_region = "lhr"

[build]

[env]
  PORT = "4000"
  NODE_ENV = "production"
  DB_PATH = "/data/database.sqlite"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "radconsent_data"
  destination = "/data"
